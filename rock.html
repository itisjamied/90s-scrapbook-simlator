<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ml5 BodyPose Side-by-Side</title>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- ml5.js -->
  <script src="https://unpkg.com/ml5@1/dist/ml5.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <script>
    let video;
    let bodyPose;
    let poses = [];
    let connections = [];
    let faceImg;

    const camW = 640;
    const camH = 480;

    function preload() {
      // Default = MoveNet
      bodyPose = ml5.bodyPose("MoveNet");

      // Replace with your own image path
      faceImg = loadImage("face.png");
    }

    function setup() {
      createCanvas(camW * 2, camH + 40);

      video = createCapture(VIDEO);
      video.size(camW, camH);
      video.hide();

      // Get skeleton connections
      connections = bodyPose.getSkeleton();

      // Start pose detection
      bodyPose.detectStart(video, gotPoses);

      imageMode(CENTER);
      textFont("Arial");
    }

    function gotPoses(results) {
      poses = results || [];
    }

    function draw() {
      background(15);

      // Labels
      fill(255);
      noStroke();
      textSize(18);
      textAlign(CENTER, CENTER);
      text("Raw Webcam Feed", camW / 2, 20);
      text("Pose Detection Overlay", camW + camW / 2, 20);

      // LEFT: raw video
      imageMode(CORNER);
      image(video, 0, 40, camW, camH);

      // RIGHT: video again
      image(video, camW, 40, camW, camH);

      // Draw pose overlay on right side
      drawSkeletons(camW, 40);
      drawKeypoints(camW, 40);

      // Draw face replacement image on right side
      drawFaceReplacement(camW, 40);
    }

    function drawSkeletons(offsetX, offsetY) {
      for (let i = 0; i < poses.length; i++) {
        let pose = poses[i];

        for (let j = 0; j < connections.length; j++) {
          let pointAIndex = connections[j][0];
          let pointBIndex = connections[j][1];

          let pointA = pose.keypoints[pointAIndex];
          let pointB = pose.keypoints[pointBIndex];

          if (pointA.confidence > 0.1 && pointB.confidence > 0.1) {
            stroke(255, 0, 0);
            strokeWeight(3);
            line(
              pointA.x + offsetX,
              pointA.y + offsetY,
              pointB.x + offsetX,
              pointB.y + offsetY
            );
          }
        }
      }
    }

    function drawKeypoints(offsetX, offsetY) {
      for (let i = 0; i < poses.length; i++) {
        let pose = poses[i];

        for (let j = 0; j < pose.keypoints.length; j++) {
          let keypoint = pose.keypoints[j];

          if (keypoint.confidence > 0.1) {
            fill(0, 255, 0);
            noStroke();
            circle(
              keypoint.x + offsetX,
              keypoint.y + offsetY,
              12
            );
          }
        }
      }
    }

  function drawFaceReplacement(offsetX, offsetY) {
  imageMode(CENTER);

  for (let i = 0; i < poses.length; i++) {
    let pose = poses[i];
    let kp = pose.keypoints;

    // MoveNet indices:
    // 0 nose
    // 1 left eye
    // 2 right eye
    // 3 left ear
    // 4 right ear

    let nose = kp[0];
    let leftEye = kp[1];
    let rightEye = kp[2];
    let leftEar = kp[3];
    let rightEar = kp[4];

    let leftPoint = null;
    let rightPoint = null;

    // Prefer ears for wider head measurement
    if (leftEar && rightEar && leftEar.confidence > 0.1 && rightEar.confidence > 0.1) {
      leftPoint = leftEar;
      rightPoint = rightEar;
    }
    // Fallback to eyes
    else if (leftEye && rightEye && leftEye.confidence > 0.1 && rightEye.confidence > 0.1) {
      leftPoint = leftEye;
      rightPoint = rightEye;
    } else {
      continue;
    }

    // Center position
    let centerX, centerY;
    if (nose && nose.confidence > 0.1) {
      centerX = nose.x;
      centerY = nose.y;
    } else {
      centerX = (leftPoint.x + rightPoint.x) / 2;
      centerY = (leftPoint.y + rightPoint.y) / 2;
    }

    // Width from outer face anchors
    let faceWidth = dist(leftPoint.x, leftPoint.y, rightPoint.x, rightPoint.y);
    faceWidth *= 1.35;

    // Preserve image aspect ratio
    let aspect = faceImg.height / faceImg.width;
    let faceHeight = faceWidth * aspect;

    // Rotation angle from left anchor to right anchor
    let angle = atan2(
      rightPoint.y - leftPoint.y,
      rightPoint.x - leftPoint.x
    );

    // Slight upward adjustment so the overlay sits better
    let yOffset = faceHeight * 0.08;

    push();
    translate(centerX + offsetX, centerY + offsetY - yOffset);
    rotate(angle + PI);
    image(faceImg, 0, 0, faceWidth * 1.4, faceHeight* 1.4);
    pop();
  }
}
  </script>
</body>
</html>
